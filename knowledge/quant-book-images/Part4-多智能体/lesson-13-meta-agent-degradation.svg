<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580">
  <defs>
    <style>
      .label { font: 500 10px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #666; letter-spacing: 0.5px; }
      .box-text { font: 600 13px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #1a1a1a; }
      .box-text-small { font: 500 11px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #1a1a1a; }
      .title { font: 600 12px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #1a1a1a; text-anchor: middle; letter-spacing: 1px; }
      .subtitle { font: 500 10px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #666; text-anchor: middle; }
      .level-title { font: 600 12px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #1a1a1a; }
      .detail { font: 500 10px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #666; }
    </style>
  </defs>

  <!-- White background -->
  <rect width="780" height="580" fill="#fff"/>

  <!-- Title -->
  <text x="390" y="28" class="title">META AGENT DEGRADATION STRATEGY</text>
  <text x="390" y="44" class="subtitle">Meta Agent 降级策略</text>

  <!-- Border box -->
  <rect x="40" y="70" width="700" height="480" fill="none" stroke="#1a1a1a" stroke-width="2" rx="8"/>

  <!-- Level 0: Normal Mode -->
  <rect x="60" y="90" width="660" height="90" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="6"/>
  <text x="80" y="115" class="level-title" style="fill: #10b981;">Level 0: 正常模式</text>
  <text x="100" y="135" class="detail">├── Regime 清晰(概率 > 70%)</text>
  <text x="100" y="152" class="detail">├── 按状态路由到对应专家</text>
  <text x="100" y="169" class="detail">└── 正常仓位运行</text>

  <!-- Level 1: Cautious Mode -->
  <rect x="60" y="200" width="660" height="90" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="6"/>
  <text x="80" y="225" class="level-title" style="fill: #f59e0b;">Level 1: 谨慎模式</text>
  <text x="100" y="245" class="detail">├── Regime 模糊(50% &lt; 概率 &lt; 70%)</text>
  <text x="100" y="262" class="detail">├── 多专家并行,权重混合</text>
  <text x="100" y="279" class="detail">└── 仓位降至 70%</text>

  <!-- Level 2: Defensive Mode -->
  <rect x="60" y="310" width="660" height="90" fill="#fed7aa" stroke="#f97316" stroke-width="2" rx="6"/>
  <text x="80" y="335" class="level-title" style="fill: #f97316;">Level 2: 防御模式</text>
  <text x="100" y="355" class="detail">├── Regime 检测失效(连续矛盾信号)</text>
  <text x="100" y="372" class="detail">├── 激活防御策略为主</text>
  <text x="100" y="389" class="detail">└── 仓位降至 50%</text>

  <!-- Level 3: Safe Mode -->
  <rect x="60" y="420" width="660" height="90" fill="#fecaca" stroke="#ef4444" stroke-width="2" rx="6"/>
  <text x="80" y="445" class="level-title" style="fill: #ef4444;">Level 3: 安全模式</text>
  <text x="100" y="465" class="detail">├── 系统检测到异常(数据质量、延迟)</text>
  <text x="100" y="482" class="detail">├── 停止所有主动交易</text>
  <text x="100" y="499" class="detail">└── 只保留对冲和止损执行</text>

  <!-- Severity indicators on the left -->
  <line x1="50" y1="135" x2="50" y2="465" stroke="#666" stroke-width="3"/>
  <polygon points="50,475 45,465 55,465" fill="#666"/>

  <text x="25" y="135" class="label" style="fill: #10b981; writing-mode: tb;">正常</text>
  <text x="25" y="465" class="label" style="fill: #ef4444; writing-mode: tb;">严重</text>
</svg>
