<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420">
  <defs>
    <style>
      .label { font: 500 10px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #666; text-anchor: middle; letter-spacing: 0.5px; }
      .box-text { font: 600 13px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #1a1a1a; text-anchor: middle; }
      .annotation { font: 400 10px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #1a1a1a; }
      .title-text { font: 700 14px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #1a1a1a; }
      .danger { fill: #ef4444; }
      .safe { fill: #10b981; }
    </style>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
  </defs>

  <rect width="680" height="420" fill="#fff"/>

  <!-- Title -->
  <text x="340" y="25" class="title-text" text-anchor="middle">故障隔离对比</text>
  <text x="340" y="42" class="label">FAULT ISOLATION COMPARISON</text>

  <!-- Scenario description -->
  <text x="340" y="65" class="annotation" text-anchor="middle">场景：Execution Agent 出现 Bug</text>
  <text x="340" y="78" class="label">SCENARIO: EXECUTION AGENT BUG</text>

  <line x1="40" y1="90" x2="640" y2="90" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Single Agent Section (LEFT) -->
  <text x="170" y="115" class="box-text">单 Agent 模式</text>
  <text x="170" y="132" class="label">SINGLE AGENT</text>

  <!-- Single monolithic box -->
  <rect x="80" y="155" width="180" height="100" fill="#fce7f3" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="170" y="180" class="box-text">全能 Agent</text>
  <text x="170" y="197" class="label">ALL-IN-ONE</text>
  <text x="170" y="215" class="annotation">信号生成</text>
  <text x="170" y="228" class="annotation">风险控制</text>
  <text x="170" y="241" class="annotation">订单执行 ✗</text>

  <!-- Big red X overlay -->
  <line x1="90" y1="165" x2="250" y2="245" stroke="#ef4444" stroke-width="4"/>
  <line x1="250" y1="165" x2="90" y2="245" stroke="#ef4444" stroke-width="4"/>

  <!-- Cascading failure arrows -->
  <line x1="170" y1="270" x2="170" y2="300" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>

  <!-- Consequences box -->
  <rect x="60" y="305" width="220" height="85" fill="#fef3c7" stroke="#ef4444" stroke-width="2" rx="2"/>
  <text x="170" y="325" class="annotation danger" text-anchor="middle">✗ 整个系统崩溃</text>
  <text x="170" y="342" class="annotation danger" text-anchor="middle">✗ 无法止损</text>
  <text x="170" y="359" class="annotation danger" text-anchor="middle">✗ 无法监控</text>
  <text x="170" y="376" class="annotation danger" text-anchor="middle">→ 灾难性后果</text>

  <!-- Multi Agent Section (RIGHT) -->
  <text x="510" y="115" class="box-text">多 Agent 模式</text>
  <text x="510" y="132" class="label">MULTI AGENT</text>

  <!-- Separate agent boxes -->
  <rect x="420" y="155" width="80" height="30" fill="#dbeafe" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="460" y="174" class="annotation">Signal</text>

  <rect x="510" y="155" width="80" height="30" fill="#fef3c7" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="550" y="174" class="annotation">Risk</text>

  <rect x="420" y="195" width="170" height="30" fill="#d1fae5" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="505" y="214" class="annotation">Execution Agent ✗</text>

  <!-- Red X on execution only -->
  <line x1="430" y1="200" x2="580" y2="220" stroke="#ef4444" stroke-width="3"/>
  <line x1="580" y1="200" x2="430" y2="220" stroke="#ef4444" stroke-width="3"/>

  <!-- Controlled response arrows -->
  <line x1="550" y1="240" x2="550" y2="265" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Response box -->
  <rect x="400" y="270" width="210" height="120" fill="#e7f5ec" stroke="#10b981" stroke-width="2" rx="2"/>
  <text x="505" y="290" class="annotation safe" text-anchor="middle">Risk Agent 检测异常</text>
  <text x="505" y="307" class="annotation safe" text-anchor="middle">↓</text>
  <text x="505" y="322" class="annotation safe" text-anchor="middle">触发紧急熔断</text>
  <text x="505" y="339" class="annotation safe" text-anchor="middle">↓</text>
  <text x="505" y="354" class="annotation safe" text-anchor="middle">通知人工介入</text>
  <text x="505" y="371" class="annotation safe" text-anchor="middle">↓</text>
  <text x="505" y="386" class="annotation safe" text-anchor="middle">其他 Agent 继续运行</text>

  <!-- Vertical divider -->
  <line x1="340" y1="100" x2="340" y2="400" stroke="#ccc" stroke-width="1" stroke-dasharray="5,5"/>
</svg>
