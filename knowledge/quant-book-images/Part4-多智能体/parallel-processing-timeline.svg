<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380">
  <defs>
    <style>
      .label { font: 500 11px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #666; letter-spacing: 0.5px; }
      .box-text { font: 600 13px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #1a1a1a; }
      .time-text { font: 600 12px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #1a1a1a; }
      .annotation { font: 400 10px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #1a1a1a; }
      .title-text { font: 700 14px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #1a1a1a; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <rect width="720" height="380" fill="#fff"/>

  <!-- Title -->
  <text x="360" y="25" class="title-text" text-anchor="middle">行情突变处理对比</text>
  <text x="360" y="42" class="label" text-anchor="middle">PARALLEL PROCESSING COMPARISON</text>

  <!-- Single Agent Section -->
  <text x="40" y="75" class="box-text">单 Agent 模式</text>
  <text x="40" y="92" class="label">SINGLE AGENT</text>

  <!-- Timeline for Single Agent -->
  <line x1="40" y1="115" x2="680" y2="115" stroke="#e5e7eb" stroke-width="2"/>

  <!-- Time markers -->
  <text x="40" y="135" class="time-text" text-anchor="start">09:30:00</text>
  <text x="180" y="135" class="time-text" text-anchor="start">09:30:01</text>
  <text x="320" y="135" class="time-text" text-anchor="start">09:30:02</text>
  <text x="460" y="135" class="time-text" text-anchor="start">09:30:03</text>
  <text x="600" y="135" class="time-text" text-anchor="start">09:30:04</text>

  <!-- Sequential blocks -->
  <rect x="40" y="150" width="120" height="35" fill="#fce7f3" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="100" y="171" class="box-text" text-anchor="middle">接收行情</text>

  <rect x="180" y="150" width="120" height="35" fill="#dbeafe" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="240" y="171" class="box-text" text-anchor="middle">计算信号</text>

  <rect x="320" y="150" width="120" height="35" fill="#fef3c7" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="380" y="171" class="box-text" text-anchor="middle">计算风控</text>

  <rect x="460" y="150" width="120" height="35" fill="#d1fae5" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="520" y="171" class="box-text" text-anchor="middle">准备订单</text>

  <rect x="600" y="150" width="80" height="35" fill="#a5f3fc" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="640" y="171" class="box-text" text-anchor="middle">提交</text>

  <!-- Delay annotation -->
  <line x1="580" y1="205" x2="640" y2="205" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="610" y="220" class="annotation" text-anchor="middle" fill="#ef4444">4秒延迟</text>
  <text x="610" y="233" class="label" text-anchor="middle" fill="#ef4444">4s DELAY</text>

  <!-- Multi Agent Section -->
  <text x="40" y="270" class="box-text">多 Agent 模式</text>
  <text x="40" y="287" class="label">MULTI AGENT</text>

  <!-- Timeline for Multi Agent -->
  <line x1="40" y1="305" x2="680" y2="305" stroke="#e5e7eb" stroke-width="2"/>

  <!-- Time markers -->
  <text x="40" y="325" class="time-text" text-anchor="start">09:30:00</text>
  <text x="280" y="325" class="time-text" text-anchor="start">09:30:01</text>
  <text x="480" y="325" class="time-text" text-anchor="start">09:30:01.5</text>

  <!-- Parallel broadcast -->
  <rect x="40" y="340" width="120" height="30" fill="#fce7f3" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="100" y="359" class="box-text" text-anchor="middle">行情广播</text>

  <!-- Parallel processing (stacked) -->
  <rect x="180" y="335" width="100" height="12" fill="#dbeafe" stroke="#1a1a1a" stroke-width="1" rx="1"/>
  <text x="230" y="344" class="label" text-anchor="middle" font-size="9px">Signal Agent</text>

  <rect x="180" y="349" width="100" height="12" fill="#fef3c7" stroke="#1a1a1a" stroke-width="1" rx="1"/>
  <text x="230" y="358" class="label" text-anchor="middle" font-size="9px">Risk Agent</text>

  <rect x="180" y="363" width="100" height="12" fill="#d1fae5" stroke="#1a1a1a" stroke-width="1" rx="1"/>
  <text x="230" y="372" class="label" text-anchor="middle" font-size="9px">Execution Agent</text>

  <!-- Results -->
  <rect x="300" y="340" width="150" height="30" fill="#fde047" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="375" y="359" class="box-text" text-anchor="middle">信号就绪+审核</text>

  <rect x="470" y="340" width="100" height="30" fill="#a5f3fc" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="520" y="359" class="box-text" text-anchor="middle">订单提交</text>

  <!-- Speed advantage annotation -->
  <line x1="470" y1="310" x2="520" y2="310" stroke="#10b981" stroke-width="2"/>
  <text x="495" y="300" class="annotation" text-anchor="middle" fill="#10b981">1.5秒，快2.5倍</text>
  <text x="495" y="290" class="label" text-anchor="middle" fill="#10b981">1.5s, 2.5× FASTER</text>

  <!-- Connecting lines showing parallelism -->
  <line x1="160" y1="355" x2="180" y2="341" stroke="#666" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="160" y1="355" x2="180" y2="355" stroke="#666" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="160" y1="355" x2="180" y2="369" stroke="#666" stroke-width="1" stroke-dasharray="2,2"/>
</svg>
