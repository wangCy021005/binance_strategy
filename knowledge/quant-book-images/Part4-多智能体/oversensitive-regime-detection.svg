<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340">
  <defs>
    <style>
      .label { font: 500 10px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #666; letter-spacing: 0.5px; }
      .box-text { font: 600 12px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #1a1a1a; }
      .annotation { font: 400 10px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #1a1a1a; }
      .title-text { font: 700 14px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #1a1a1a; }
      .state-text { font: 700 11px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #1a1a1a; }
    </style>
  </defs>

  <rect width="720" height="340" fill="#fff"/>

  <!-- Title -->
  <text x="360" y="30" class="title-text" text-anchor="middle">过敏型误判 - 频繁切换</text>
