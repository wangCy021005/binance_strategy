<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360">
  <defs>
    <style>
      .label { font: 500 10px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #666; text-anchor: middle; letter-spacing: 0.5px; }
      .box-text { font: 600 13px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #1a1a1a; text-anchor: middle; }
      .annotation { font: 400 10px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #666; }
      .title-text { font: 700 14px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #1a1a1a; }
    </style>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <rect width="600" height="360" fill="#fff"/>

  <!-- Title -->
  <text x="300" y="30" class="title-text" text-anchor="middle">层级决策结构</text>
  <text x="300" y="47" class="label">HIERARCHICAL DECISION STRUCTURE</text>

  <!-- Meta Agent (Top) -->
  <rect x="200" y="80" width="200" height="55" fill="#f9a8d4" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="300" y="105" class="box-text">Meta Agent</text>
  <text x="300" y="122" class="label">最高决策权</text>

  <!-- Connecting lines -->
  <line x1="300" y1="135" x2="300" y2="170" stroke="#666" stroke-width="2" marker-end="url(#arrow-down)"/>

  <!-- Branch lines -->
  <line x1="140" y1="170" x2="300" y2="170" stroke="#666" stroke-width="2"/>
  <line x1="300" y1="170" x2="460" y2="170" stroke="#666" stroke-width="2"/>

  <line x1="140" y1="170" x2="140" y2="200" stroke="#666" stroke-width="2" marker-end="url(#arrow-down)"/>
  <line x1="300" y1="170" x2="300" y2="200" stroke="#666" stroke-width="2" marker-end="url(#arrow-down)"/>
  <line x1="460" y1="170" x2="460" y2="200" stroke="#666" stroke-width="2" marker-end="url(#arrow-down)"/>

  <!-- Sub Agents (Bottom Row) -->
  <rect x="50" y="205" width="180" height="50" fill="#67e8f9" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="140" y="227" class="box-text">Signal Agent</text>
  <text x="140" y="244" class="label">SIGNAL GENERATION</text>

  <rect x="250" y="205" width="100" height="50" fill="#fde047" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="300" y="227" class="box-text">Risk Agent</text>
  <text x="300" y="244" class="label">RISK CONTROL</text>

  <rect x="370" y="205" width="180" height="50" fill="#5eead4" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="460" y="227" class="box-text">Execution Agent</text>
  <text x="460" y="244" class="label">ORDER EXECUTION</text>

  <!-- Annotations -->
  <text x="300" y="290" class="annotation" text-anchor="middle">Meta Agent 拥有最终决策权</text>
  <text x="300" y="305" class="label" text-anchor="middle">META AGENT HAS FINAL DECISION AUTHORITY</text>

  <text x="300" y="330" class="annotation" text-anchor="middle">其他 Agent 提供建议和专业执行</text>
  <text x="300" y="345" class="label" text-anchor="middle">OTHER AGENTS PROVIDE ADVICE &amp; EXECUTION</text>
</svg>
